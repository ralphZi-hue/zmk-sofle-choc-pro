# This file generates the GitHub Actions matrix.
# Nur noch die Sofle Choc Pro BT wird gebaut (Ralphs Board), damit die
# Builds schnell sind. Corne/Piantor wurden entfernt (bei Bedarf aus der
# Git-Historie wiederherstellbar).
---
include:
  - board: sofle_choc_pro_left
    snippet: studio-rpc-usb-uart
    shield: nice_view_disp
    cmake-args: -DCONFIG_ZMK_STUDIO=y
  - board: sofle_choc_pro_right
    shield: nice_view_disp
    snippet: studio-rpc-usb-uart

  - board: sofle_choc_pro_left
    shield: settings_reset
    snippet: studio-rpc-usb-uart
  - board: sofle_choc_pro_right
    shield: settings_reset
    snippet: studio-rpc-usb-uart
